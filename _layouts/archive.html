---
layout: default
---
<header class="page-header">
  <div class="container">
    <h1 class="page-header__title">{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="page-header__subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </div>
</header>
<div class="page-content">
  <div class="container">
    <div class="archive-detail__meta">
      <span>📅 {{ page.date_display }}</span>
      <span>📍 {{ page.cities | join: ' · ' }}</span>
      <span>👥 {{ page.attendees | default: 'N/A' }} attendees</span>
    </div>
    {{ content }}
    {% if page.closing_note %}
    <blockquote class="archive-detail__closing">
      {{ page.closing_note }}
    </blockquote>
    {% endif %}
  </div>
</div>
