        - time: "11:30"
          title: "Combatting Burnout in Cyber Security"
          speaker: "Jasmina Zito & Bianca Forbes"
          description: "In recent years, we've seen an increase in corporate webinars, panel discussions and resources about combatting burnout and achieving a healthy work-life balance. Rightly so. Working in general, but particularly in this industry, is incredibly stressful. But what do we do when yoga or mindfulness just doesn't cut it? For some of us, our brains simply don't work the same way as the others do. For others, our bodies refuse to let us get on with it. The onus on us to manage our own burnout can be tangled with shame and frustration. In this session, Jasmina will share her experience working full time with chronic illness and neurodiversity. We'll discuss some ways you can support your colleagues - or yourself - through invisible challenges. Jasmina is an accomplished threat intelligence specialist with a diverse background in games development, illustration and Japanese fashion subcultures. She is a senior security leader at Canva, having successfully built a threat intelligence program to support the Security & Trust division. In 2023, Jasmina won the Australian Women Leading Tech award for Cyber Security."
          tag: personal
        - time: "12:00"
          title: "Returning to work in Cyber after intense cancer treatment"
          speaker: "Adam Stevens"
          description: "If you have ever come back to a project after one or two months, you would know it is very hard to pick up right where you left off. Context you once had has faded in memory, and the domain knowledge is covered in rust. Adam took close to 12 months away from work due to his highly intense leukaemia treatment. This meant coming back to a life he had not thought about for a year, with the addition of vast number of physical and mental side effects of cancer treatment. This presentation documents Adam's recovery over the last year, with a focus on his career as a Security Analyst in Suncorp's Threat Management team. Adam Stevens is a lightly seasoned analyst with Suncorp's Threat Management team. He joined the organisation in early 2022 and quickly made an impact. Unfortunately, a few months later, Adam faced a personal challenge when he was diagnosed with Leukaemia. Determined to overcome it, he took a year off to undergo intensive chemotherapy. In May 2023, Adam triumphantly returned to his full-time position at Suncorp as a cancer-free man. Adam's expertise lies in the intersection of SOAR (Security Orchestration, Automation, and Response) and security engineering. He's passionate about enhancing threat detection and incident response processes. When he's not immersed in cybersecurity, Adam enjoys hitting the gym, programming, 3D modelling/printing, and cherishing quality time with family and friends."
          tag: personal
        - time: "12:30"
          title: "Lunch"
          tag: break
        - time: "13:30"
          title: "The Enigma machine - Development, Evolution, Compromse"
          speaker: "Mike Pritchard"
          description: "Most people in cyber have some awareness that WWII code breaking led to the birth of computing and the industrialisation of intel handling. But since that tech was developed in secret and then destroyed at the end of the war, there is almost nowhere you can see our astonishing heritage first hand. This talk uniquely features fully working 1940's cipher machines and original WWII German Enigma codebooks. With these we'll look at the origins and evolution of the infamous Enigma machine and the process of breaking it, then live demo the machines. Afterwards there will be the opportunity for some \"hands on\" time. Security2Cure is pleased to offer this talk that takes you back to the very roots of computing and cyber. Mike Pritchard, founder and curator Espionage Museum Australia"
          tag: technical
